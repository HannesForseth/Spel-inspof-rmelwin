<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skogens Skördare</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="game-container"></div>

  <div id="ui">
    <div id="topbar">
      <div id="title">🌲 Skogens Skördare</div>
      <div id="time-label">☀️ Dag</div>
    </div>

    <div id="inventory">
      <div class="resource">🪵 Trä <span id="wood-count">0</span></div>
      <div class="resource">🫐 Bär <span id="berry-count">0</span></div>
      <div class="resource">🐟 Fisk <span id="fish-count">0</span></div>
      <div class="resource">🟫 Skinn <span id="hide-count">0</span></div>
      <div class="resource">🥩 Kött <span id="meat-count">0</span></div>
      <div class="resource">🍖 Tillagat <span id="cooked-count">0</span></div>
      <div class="resource">🏹 Pilar <span id="arrow-count">0</span></div>
      <div class="resource backpack">🎒 <span id="total-count">0</span>/<span id="capacity">10</span></div>
      <div class="resource gold">💰 <span id="gold-count">0</span></div>
    </div>

    <div id="hp-bar-container">
      <div id="hp-label">❤️ <span id="hp-text">100/100</span></div>
      <div id="hp-bar"><div id="hp-fill"></div></div>
    </div>

    <div id="weapon-hud">
      <div class="weapon-slot" data-weapon="sword">⚔️ <span class="key">1</span></div>
      <div class="weapon-slot" data-weapon="bow">🏹 <span class="key">2</span></div>
    </div>

    <div id="controls-hint">
      <b>WASD</b> rörelse · <b>Shift</b> spring · <b>Space</b> hopp · <b>E</b> samla/handla · <b>F</b> attack · <b>1/2</b> vapen · <b>H</b> ät
    </div>

    <div id="interact-prompt"></div>
    <div id="progress-bar"><div id="progress-fill"></div></div>

    <div id="shop" class="hidden">
      <h2>🏪 Smedjan</h2>
      <div id="shop-tabs">
        <button class="tab active" data-tab="sell">💰 Sälj</button>
        <button class="tab" data-tab="buy">🛒 Köp</button>
        <button class="tab" data-tab="upgrade">⚒️ Uppgradera</button>
        <button class="tab" data-tab="craft">🔨 Tillverka</button>
      </div>
      <div id="shop-content"></div>
      <button id="close-shop">Stäng (Esc)</button>
    </div>

    <div id="toast"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
